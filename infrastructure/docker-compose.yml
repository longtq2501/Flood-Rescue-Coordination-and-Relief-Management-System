version: '3.9'

include:
  - docker-compose.infra.yml

services:

  # ==================== API GATEWAY (Entry Point) ====================
  gateway:
    build: ../gateway
    container_name: rescue-gateway
    ports:
      - "8080:8080"    # Only Gateway exposes port to host
    environment:
      AUTH_SERVICE_URL: http://auth-service:8081
      BACKEND_SERVICE_URL: http://backend:8082
      JWT_SECRET: ${JWT_SECRET:-your-256-bit-secret-key-change-in-production}
      REDIS_HOST: redis
      REDIS_PASSWORD: redispassword
      CORS_ALLOWED_ORIGINS: http://localhost:3000
    depends_on:
      auth-service:
        condition: service_healthy
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ==================== AUTH SERVICE ====================
  auth-service:
    build: ../auth-service
    container_name: rescue-auth-service
    # No ports mapping — internal network only
    environment:
      DB_AUTH_URL: jdbc:mysql://mysql:3306/db_auth
      DB_USERNAME: rescueuser
      DB_PASSWORD: rescuepassword
      JWT_SECRET: ${JWT_SECRET:-your-256-bit-secret-key-change-in-production}
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8081/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ==================== BACKEND (Monolith) ====================
  backend:
    build: ../backend
    container_name: rescue-backend
    # No ports mapping — internal network only
    environment:
      DB_DISPATCH_URL: jdbc:mysql://mysql:3306/db_dispatch
      DB_REQUEST_URL: jdbc:mysql://mysql:3306/db_request
      DB_RESOURCE_URL: jdbc:mysql://mysql:3306/db_resource
      DB_NOTIFICATION_URL: jdbc:mysql://mysql:3306/db_notification
      DB_REPORT_URL: jdbc:mysql://mysql:3306/db_report
      DB_USERNAME: rescueuser
      DB_PASSWORD: rescuepassword
      JWT_SECRET: ${JWT_SECRET:-your-256-bit-secret-key-change-in-production}  # needed for WebSocket auth
      REDIS_HOST: redis
      RABBITMQ_HOST: rabbitmq
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8082/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ==================== FRONTEND ====================
  frontend:
    build: ../frontend
    container_name: rescue-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080  # Points to Gateway
    depends_on:
      - gateway