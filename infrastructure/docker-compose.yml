version: '3.9'

include:
  - docker-compose.infra.yml

services:

  # ==================== ZIPKIN (Tracing) ====================
  zipkin:
    image: openzipkin/zipkin
    container_name: rescue-zipkin
    ports:
      - "9411:9411"
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:9411/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ==================== API GATEWAY (Entry Point) ====================
  gateway:
    build: ../gateway
    container_name: rescue-gateway
    ports:
      - "8080:8080"
    environment:
      AUTH_SERVICE_URL: http://auth-service:8081
      REQUEST_SERVICE_URL: http://request-service:8082
      DISPATCH_SERVICE_URL: http://dispatch-service:8083
      RESOURCE_SERVICE_URL: http://resource-service:8084
      NOTIFICATION_SERVICE_URL: http://notification-service:8085
      REPORT_SERVICE_URL: http://report-service:8086
      JWT_SECRET: ${JWT_SECRET:-your-256-bit-secret-key-change-in-production}
      REDIS_HOST: redis
      REDIS_PASSWORD: redispassword
      CORS_ALLOWED_ORIGINS: http://localhost:3000
      # JVM Optimization Flags
      JAVA_OPTS: "-Xmx256m -Xms128m -XX:MaxMetaspaceSize=128m -XX:TieredStopAtLevel=1"
    deploy:
      resources:
        limits:
          memory: 400M
    depends_on:
      auth-service: { condition: service_healthy }
      request-service: { condition: service_healthy }
      dispatch-service: { condition: service_healthy }
      resource-service: { condition: service_healthy }
      notification-service: { condition: service_healthy }
      report-service: { condition: service_healthy }
      redis: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 90s

  # ==================== AUTH SERVICE ====================
  auth-service:
    build: ../auth-service
    container_name: rescue-auth-service
    environment:
      DB_AUTH_URL: jdbc:mysql://mysql:3306/db_auth
      DB_USERNAME: rescueuser
      DB_PASSWORD: rescuepassword
      JWT_SECRET: ${JWT_SECRET:-your-256-bit-secret-key-change-in-production}
      # JVM Optimization Flags
      JAVA_OPTS: "-Xmx512m -Xms256m -XX:MaxMetaspaceSize=256m -XX:TieredStopAtLevel=1"
    deploy:
      resources:
        limits:
          memory: 800M
    depends_on:
      mysql: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8081/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  # ==================== REQUEST SERVICE ====================
  request-service:
    build: ../request-service
    container_name: rescue-request-service
    environment:
      DB_REQUEST_URL: jdbc:mysql://mysql:3306/db_request
      DB_USERNAME: rescueuser
      DB_PASSWORD: rescuepassword
      JWT_SECRET: ${JWT_SECRET:-your-256-bit-secret-key-change-in-production}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: rescueuser
      RABBITMQ_PASS: rescuepassword
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: rescueaccess
      MINIO_SECRET_KEY: rescuesecret
      # JVM Optimization Flags
      JAVA_OPTS: "-Xmx512m -Xms256m -XX:MaxMetaspaceSize=256m -XX:TieredStopAtLevel=1"
    deploy:
      resources:
        limits:
          memory: 800M
    depends_on:
      mysql: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8082/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  # ==================== DISPATCH SERVICE ====================
  dispatch-service:
    build: ../dispatch-service
    container_name: rescue-dispatch-service
    environment:
      DB_URL: jdbc:mysql://mysql:3306/db_dispatch
      DB_USERNAME: rescueuser
      DB_PASSWORD: rescuepassword
      JWT_SECRET: ${JWT_SECRET:-your-256-bit-secret-key-change-in-production}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USERNAME: rescueuser
      RABBITMQ_PASSWORD: rescuepassword
      REDIS_HOST: redis
      REDIS_PASSWORD: redispassword
      # JVM Optimization Flags
      JAVA_OPTS: "-Xmx512m -Xms256m -XX:MaxMetaspaceSize=256m -XX:TieredStopAtLevel=1"
    deploy:
      resources:
        limits:
          memory: 800M
    depends_on:
      mysql: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8083/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  # ==================== RESOURCE SERVICE ====================
  resource-service:
    build: ../resource-service
    container_name: rescue-resource-service
    environment:
      DB_URL: jdbc:mysql://mysql:3306/db_resource
      DB_USERNAME: rescueuser
      DB_PASSWORD: rescuepassword
      JWT_SECRET: ${JWT_SECRET:-your-256-bit-secret-key-change-in-production}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USERNAME: rescueuser
      RABBITMQ_PASSWORD: rescuepassword
      # JVM Optimization Flags
      JAVA_OPTS: "-Xmx512m -Xms256m -XX:MaxMetaspaceSize=256m -XX:TieredStopAtLevel=1"
    deploy:
      resources:
        limits:
          memory: 800M
    depends_on:
      mysql: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8084/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  # ==================== NOTIFICATION SERVICE ====================
  notification-service:
    build: ../notification-service
    container_name: rescue-notification-service
    environment:
      DB_URL: jdbc:mysql://mysql:3306/db_notification
      DB_USERNAME: rescueuser
      DB_PASSWORD: rescuepassword
      JWT_SECRET: ${JWT_SECRET:-your-256-bit-secret-key-change-in-production}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USERNAME: rescueuser
      RABBITMQ_PASSWORD: rescuepassword
      # JVM Optimization Flags
      JAVA_OPTS: "-Xmx512m -Xms256m -XX:MaxMetaspaceSize=256m -XX:TieredStopAtLevel=1"
    deploy:
      resources:
        limits:
          memory: 800M
    depends_on:
      mysql: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8085/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  # ==================== REPORT SERVICE ====================
  report-service:
    build: ../report-service
    container_name: rescue-report-service
    environment:
      DB_REPORT_URL: jdbc:mysql://mysql:3306/db_report
      DB_USERNAME: rescueuser
      DB_PASSWORD: rescuepassword
      JWT_SECRET: ${JWT_SECRET:-your-256-bit-secret-key-change-in-production}
      REDIS_HOST: redis
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: rescueuser
      RABBITMQ_PASS: rescuepassword
      ZIPKIN_URL: http://zipkin:9411/api/v2/spans  # thêm dòng này
      # JVM Optimization Flags
      JAVA_OPTS: "-Xmx512m -Xms256m -XX:MaxMetaspaceSize=256m -XX:TieredStopAtLevel=1"
    deploy:
      resources:
        limits:
          memory: 800M
    depends_on:
      mysql: { condition: service_healthy }
      redis: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
      zipkin: { condition: service_healthy }  # thêm dòng này
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8086/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  # ==================== FRONTEND ====================
  frontend:
    build: ../frontend
    container_name: rescue-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080  # Points to Gateway
    depends_on:
      - gateway
