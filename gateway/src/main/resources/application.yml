server:
  port: 8080

spring:
  main:
    banner-mode: off
  cloud:
    gateway:
      routes:
        # Auth service
        - id: auth-service
          uri: ${AUTH_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/auth/**

        # Request service
        - id: request-service
          uri: ${REQUEST_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/requests/**

        # Dispatch service
        - id: dispatch-service
          uri: ${DISPATCH_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/dispatch/**

        # Resource service
        - id: resource-service
          uri: ${RESOURCE_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/api/resources/**

        # Notification service
        - id: notification-service
          uri: ${NOTIFICATION_SERVICE_URL:http://localhost:8085}
          predicates:
            - Path=/api/notifications/**

        # Report service
        - id: report-service
          uri: ${REPORT_SERVICE_URL:http://localhost:8086}
          predicates:
            - Path=/api/reports/**

        # WebSocket route
        - id: report-websocket
          uri: ${REPORT_SERVICE_URL:http://localhost:8086}
          predicates:
            - Path=/ws/**

      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_FIRST

      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins:
              - ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:redispassword}

springdoc:
  swagger-ui:
    urls:
      - name: Auth Service
        url: /api/auth/v3/api-docs
      - name: Request Service
        url: /api/requests/v3/api-docs
      - name: Dispatch Service
        url: /api/dispatch/v3/api-docs
      - name: Resource Service
        url: /api/resources/v3/api-docs
      - name: Notification Service
        url: /api/notifications/v3/api-docs
      - name: Report Service
        url: /api/reports/v3/api-docs

app:
  jwt:
    secret: ${JWT_SECRET:your-256-bit-secret-key-change-in-production}
  # Public endpoints that skip JWT validation
  public-paths:
    - /v3/api-docs/**
    - /swagger-ui/**
    - /swagger-ui.html
    - /api/auth/v3/api-docs
    - /api/requests/v3/api-docs
    - /api/dispatch/v3/api-docs
    - /api/resources/v3/api-docs
    - /api/notifications/v3/api-docs
    - /api/reports/v3/api-docs
    - /api/auth/register
    - /api/auth/login
    - /api/auth/refresh
    - /api/auth/health
    - /api/requests/health
    - /api/dispatch/health
    - /api/resources/health
    - /api/notifications/health
    - /api/reports/health
    - /actuator/health

management:
  endpoints:
    web:
      exposure:
        include: health,gateway
