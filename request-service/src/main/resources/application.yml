spring:
  datasource:
    url: ${DB_REQUEST_URL:jdbc:mysql://localhost:3306/db_request}
    username: ${DB_USERNAME:rescueuser}
    password: ${DB_PASSWORD:rescuepassword}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:rescueuser}
    password: ${RABBITMQ_PASS:rescuepassword}

app:
  jwt:
    secret: ${JWT_SECRET:your-256-bit-secret-key-change-in-production}

minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin123}
  bucket-name: rescue-images

server:
  port: 8082

management:
  endpoints:
    web:
      exposure:
        include: health
  health:
    rabbit:
      enabled: false
