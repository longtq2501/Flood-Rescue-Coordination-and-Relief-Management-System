spring:
  main:
    banner-mode: off
  datasource:
    report:
      jdbc-url: ${DB_REPORT_URL:jdbc:mysql://localhost:3306/db_report}
      username: ${DB_USERNAME:rescueuser}
      password: ${DB_PASSWORD:rescuepassword}
      driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate        # Flyway quản lý schema, JPA chỉ validate
    show-sql: false
    properties:
      hibernate:
        # dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    validate-on-migrate: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:redispassword}

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:rescueuser}
    password: ${RABBITMQ_PASS:rescuepassword}

app:
  jwt:
    secret: ${JWT_SECRET:your-256-bit-secret-key-change-in-production}
    expiration-ms: 86400000       # 24 giờ
    refresh-expiration-ms: 604800000  # 7 ngày
  sse:
    timeout-ms: 1800000           # 30 phút

minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin123}
  bucket-name: rescue-images

server:
  port: 8086

management:
  tracing:
    sampling:
      probability: 1.0  # thêm dòng này - sample 100% requests
  health:
    rabbit:
      enabled: false
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_URL:http://localhost:9411/api/v2/spans}